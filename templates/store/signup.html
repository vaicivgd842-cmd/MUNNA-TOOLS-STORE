<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Create Account — MUNNA TOOLS STORE</title>
  <meta name="description" content="Create your MUNNA Tools Store account to purchase bot subscriptions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-cyan:   hsl(193, 100%, 50%);  /* index.css --primary */
      --accent-blue:   hsl(216, 100%, 50%);  /* index.css --chart-5 */
      --accent-green:  hsl(160, 100%, 45%);  /* index.css --chart-2 */
      --bg-deep:       hsl(222, 47%,  6%);   /* index.css --background */
      --bg-card:       hsl(220, 40%,  8%);   /* index.css --card */
      --border-subtle: hsl(215, 35%, 20%);   /* index.css --border */
      --border-ring:   hsl(193, 100%, 50%);  /* index.css --ring */
      --text-primary:  hsl(210, 40%, 93%);   /* index.css --foreground */
      --text-secondary:hsl(210, 25%, 58%);   /* index.css --muted-foreground */
      --text-muted:    hsl(215, 20%, 38%);   /* darker muted */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-x: hidden;
      position: relative;
    }

    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: orb-float 8s ease-in-out infinite alternate; }
    .bg-orb-1 { width: 400px; height: 400px; background: rgba(13,202,240,0.06); top: -10%; left: -10%; animation-duration: 9s; }
    .bg-orb-2 { width: 350px; height: 350px; background: rgba(59,130,246,0.05); bottom: -5%; right: -5%; animation-duration: 11s; }

    @keyframes orb-float { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,30px) scale(1.05); } }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(13,202,240,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(13,202,240,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .signup-card {
      background: rgba(8,15,28,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(13,202,240,0.12);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 460px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.04) inset;
      animation: cardIn 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .signup-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    }

    @keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .logo-area { text-align: center; margin-bottom: 1.75rem; }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(13,202,240,0.2), rgba(59,130,246,0.2));
      border: 1px solid rgba(13,202,240,0.3);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 0.875rem;
      box-shadow: 0 0 24px rgba(13,202,240,0.15);
    }
    .logo-title {
      font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e2e8f0, var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 0.76rem; color: var(--text-muted); margin-top: 4px; }

    /* 2-column form grid on wider screens */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; }
    .form-full { grid-column: 1 / -1; }

    .form-group { margin-bottom: 0; }

    .form-label {
      display: block; font-size: 0.7rem; font-weight: 600;
      color: var(--text-secondary); text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 0.35rem;
    }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; }

    .form-input {
      width: 100%;
      background: rgba(11,20,36,0.8);
      border: 1px solid var(--border-subtle);
      border-radius: 9px;
      padding: 0.65rem 0.75rem 0.65rem 2.2rem;
      color: var(--text-primary);
      font-size: 0.825rem;
      font-family: inherit;
      transition: all 0.2s ease;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(13,202,240,0.12); background: var(--bg-card); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }

    .pw-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; background: none; border: none; font-size: 0.85rem; padding: 0; transition: color 0.2s; }
    .pw-toggle:hover { color: var(--text-primary); }

    /* Password strength */
    .pw-strength-bar {
      display: flex; gap: 3px; margin-top: 6px;
    }
    .pw-seg {
      flex: 1; height: 3px; border-radius: 99px;
      background: var(--border-subtle);
      transition: background 0.3s;
    }
    .pw-strength-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; }

    .btn-primary-full {
      width: 100%; padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent-cyan), #0a8fa8);
      border: none; border-radius: 10px;
      color: #040810; font-size: 0.875rem; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-top: 1.25rem;
    }
    .btn-primary-full:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,202,240,0.35); }
    .btn-primary-full:disabled { opacity: 0.65; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(4,8,16,0.5); border-top-color: #040810; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .loading .spinner { display: inline-block; }
    .loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; color: var(--text-muted); font-size: 0.72rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }

    .btn-outline-full {
      width: 100%; padding: 0.72rem;
      background: transparent; border: 1px solid var(--border-subtle);
      border-radius: 10px; color: var(--text-secondary);
      font-size: 0.8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-outline-full:hover { background: rgba(13,202,240,0.05); border-color: rgba(13,202,240,0.3); color: var(--accent-cyan); }

    .alert-box {
      display: none; border-radius: 9px; padding: 0.625rem 0.875rem;
      font-size: 0.78rem; margin-bottom: 1rem; animation: fadeIn 0.2s ease;
    }
    .alert-error  { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .footer-links { text-align: center; margin-top: 1.25rem; font-size: 0.72rem; color: var(--text-muted); }
    .footer-links a { color: var(--accent-cyan); text-decoration: none; font-weight: 600; }
    .footer-links a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="signup-card">
    <div class="logo-area">
      <div class="logo-icon">📝</div>
      <div class="logo-title">Create Your Account</div>
      <div class="logo-sub">Join MUNNA Tools Store today</div>
    </div>

    <div class="alert-box alert-error" id="errBox"></div>
    <div class="alert-box alert-success" id="okBox"></div>

    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label" for="inp-name">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="inp-name" class="form-input" type="text" placeholder="Your full name" autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input id="inp-email" class="form-input" type="email" placeholder="you@email.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-phone">Phone (Optional)</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input id="inp-phone" class="form-input" type="tel" placeholder="01XXXXXXXXX">
        </div>
      </div>

      <div class="form-group form-full">
        <label class="form-label" for="inp-user">Username</label>
        <div class="input-wrap">
          <span class="input-icon">🏷</span>
          <input id="inp-user" class="form-input" type="text" placeholder="3-30 chars, letters/numbers" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-pass">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="inp-pass" class="form-input" type="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="pw-toggle" type="button" onclick="togglePw('inp-pass', this)">👁</button>
        </div>
        <div class="pw-strength-bar">
          <div class="pw-seg" id="seg1"></div>
          <div class="pw-seg" id="seg2"></div>
          <div class="pw-seg" id="seg3"></div>
          <div class="pw-seg" id="seg4"></div>
        </div>
        <div class="pw-strength-label" id="pw-label">Enter a strong password</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-confirm">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">✅</span>
          <input id="inp-confirm" class="form-input" type="password" placeholder="Repeat password" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('inp-confirm', this)">👁</button>
        </div>
      </div>
    </div>

    <button class="btn-primary-full" id="signupBtn" onclick="doSignup()">
      <span class="spinner"></span>
      <span class="btn-text">🚀 Create Account</span>
    </button>

    <div class="divider">already have an account?</div>

    <button class="btn-outline-full" onclick="window.location.href='/store/login'">
      🔐 Sign In Instead
    </button>

    <div class="footer-links">
      By signing up, you agree to our <a href="#">Terms of Service</a>
    </div>
  </div>

  <script>
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    function checkStrength(pw) {
      const segs = [document.getElementById('seg1'),document.getElementById('seg2'),document.getElementById('seg3'),document.getElementById('seg4')];
      const label = document.getElementById('pw-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;

      const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
      const labels = ['', '⚠ Weak', '⚡ Fair', '✓ Good', '✅ Strong'];
      segs.forEach((s, i) => { s.style.background = i < score ? colors[score] : 'var(--border-subtle)'; });
      label.textContent = pw.length === 0 ? 'Enter a strong password' : labels[score];
      label.style.color = pw.length === 0 ? 'var(--text-muted)' : (score <= 1 ? '#fca5a5' : score === 2 ? '#fcd34d' : score === 3 ? '#93c5fd' : '#86efac');
    }

    function showMsg(type, msg) {
      const errBox = document.getElementById('errBox');
      const okBox  = document.getElementById('okBox');
      errBox.style.display = 'none';
      okBox.style.display  = 'none';
      if (type === 'error') { errBox.textContent = '⚠ ' + msg; errBox.style.display = 'block'; }
      else { okBox.textContent = '✅ ' + msg; okBox.style.display = 'block'; }
    }

    async function doSignup() {
      const name    = document.getElementById('inp-name').value.trim();
      const email   = document.getElementById('inp-email').value.trim();
      const phone   = document.getElementById('inp-phone').value.trim();
      const u       = document.getElementById('inp-user').value.trim();
      const p       = document.getElementById('inp-pass').value;
      const cp      = document.getElementById('inp-confirm').value;

      if (!name || !email || !u || !p) { showMsg('error', 'All fields except phone are required.'); return; }
      if (p.length < 8) { showMsg('error', 'Password must be at least 8 characters long.'); return; }
      if (p !== cp) { showMsg('error', 'Passwords do not match.'); return; }
      if (!/^[a-zA-Z0-9_.@-]{3,30}$/.test(u)) { showMsg('error', 'Username: 3-30 chars, letters/numbers/._@- only'); return; }

      const btn = document.getElementById('signupBtn');
      btn.classList.add('loading'); btn.disabled = true;

      try {
        const r = await fetch('/api/store/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ full_name: name, email: email, phone_number: phone, username: u, password: p })
        });
        const j = await r.json();

        if (j.status === 'ok') {
          showMsg('success', j.message || 'Account created! Redirecting to login...');
          setTimeout(() => window.location.href = '/store/login', 1800);
        } else {
          showMsg('error', j.message || 'Signup failed. Please try again.');
          btn.classList.remove('loading'); btn.disabled = false;
        }
      } catch (err) {
        showMsg('error', 'Network error. Please check your connection.');
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }
  </script>
</body>
</html>
