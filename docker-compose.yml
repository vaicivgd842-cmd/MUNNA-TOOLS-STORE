version: '3.8'

services:
  web:
    build: .
    container_name: flask_web
    restart: always
    expose:
      - "5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - DB_PATH=/app/data/users.db
      - ADMIN_USER=${ADMIN_USER:?ADMIN_USER must be set in .env}
      - ADMIN_PASS=${ADMIN_PASS:?ADMIN_PASS must be set in .env}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set in .env}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=false
      - SESSION_LIFETIME_MINUTES=${SESSION_LIFETIME_MINUTES:-60}
      - TELEGRAM_ALERT_BOT_TOKEN=${TELEGRAM_ALERT_BOT_TOKEN:-}
      - TELEGRAM_ALERT_CHAT_ID=${TELEGRAM_ALERT_CHAT_ID:-}
    volumes:
      - ./data:/app/data
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: flask_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      # SSL certificates from Let's Encrypt
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Let's Encrypt ACME challenge webroot
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
